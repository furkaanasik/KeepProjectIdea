<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keep Project Idea — Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="min-h-screen bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-emerald-500/30"
  >
    <div
      class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_20%_-10%,rgba(16,185,129,0.08),transparent_50%),radial-gradient(circle_at_90%_10%,rgba(99,102,241,0.08),transparent_45%)]"
    ></div>

    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-10 lg:py-14">
      <header class="mb-10 flex flex-col gap-2">
        <span
          class="inline-flex w-fit items-center gap-2 rounded-full border border-zinc-800 bg-zinc-900/60 px-3 py-1 text-[11px] font-medium uppercase tracking-wider text-zinc-400"
        >
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-400"></span>
          Strategic analyzer
        </span>
        <h1
          class="text-4xl sm:text-5xl font-bold tracking-tight bg-gradient-to-r from-zinc-50 via-zinc-200 to-zinc-500 bg-clip-text text-transparent"
        >
          Keep Project Idea
        </h1>
        <p class="text-zinc-400 max-w-xl">
          Paste your project idea and get a strategic analysis — competitors,
          market, viability, and a ready-to-use master prompt.
        </p>
      </header>

      <div
        class="grid grid-cols-1 lg:[grid-template-columns:280px_1fr] gap-6"
      >
        <aside
          class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-5 backdrop-blur-sm h-fit lg:sticky lg:top-6"
          aria-label="Recent analyses"
        >
          <h2
            class="text-[11px] font-semibold uppercase tracking-wider text-zinc-500 mb-3"
          >
            Recent
          </h2>
          <ul
            id="recent-list"
            data-testid="recent-list"
            class="flex flex-col gap-2"
          ></ul>
          <div
            id="recent-empty"
            class="hidden text-sm italic text-zinc-500"
          >
            No analyses yet.
          </div>
        </aside>

        <main class="flex flex-col gap-6 min-w-0">
          <form
            id="analyze-form"
            class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6 backdrop-blur-sm flex flex-col gap-4"
          >
            <label
              for="idea"
              class="text-[11px] font-semibold uppercase tracking-wider text-zinc-500"
            >
              Project idea
            </label>
            <textarea
              id="idea"
              name="idea"
              maxlength="6000"
              required
              placeholder="Describe your idea (max 6000 chars)…"
              class="w-full min-h-[180px] rounded-xl border border-zinc-800 bg-zinc-950/60 p-4 text-zinc-100 placeholder:text-zinc-600 focus:border-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-500/30 resize-y transition"
            ></textarea>
            <div class="flex items-center justify-between gap-3 flex-wrap">
              <p class="text-xs text-zinc-500">Up to 6,000 characters.</p>
              <button
                id="submit-btn"
                type="submit"
                class="rounded-xl bg-zinc-100 px-6 py-2.5 text-sm font-semibold text-zinc-950 transition hover:bg-white hover:shadow-lg hover:shadow-zinc-100/10 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none"
              >
                Analyze
              </button>
            </div>
          </form>

          <div
            id="status"
            class="hidden rounded-xl border border-zinc-800 bg-zinc-900/50 px-4 py-3 text-sm italic text-zinc-400 backdrop-blur-sm"
            aria-live="polite"
          >
            Analyzing…
          </div>
          <div
            id="error"
            class="hidden rounded-xl border border-red-500/40 bg-red-500/10 px-4 py-3 text-sm text-red-300"
            role="alert"
          ></div>
          <div id="results"></div>
        </main>
      </div>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
